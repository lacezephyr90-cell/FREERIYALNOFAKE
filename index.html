<!DOCTYPE html>
<html>
<head>
  <title>free ﷼ *LIFETIME OFFER*</title>

  <style>
    body {
      font-family: "Comic Sans MS", cursive;
      background: black;
      color: lime;
      overflow: hidden;
    }

    .square {
      position: absolute;
      width: 150px;
      height: 150px;
      opacity: 0.6;
      animation: move 3s infinite alternate;
    }

    .green { background: lime; }
    .purple { background: purple; }

    @keyframes move {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(50px, 50px) rotate(180deg); }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 200px;
    }

    input, button {
      font-family: "Comic Sans MS", cursive;
      padding: 10px;
      margin: 5px;
      font-size: 18px;
      border: 2px dashed purple;
      background: black;
      color: lime;
    }

    button:hover {
      background: purple;
      color: lime;
    }

    h1 {
      font-size: 40px;
      text-shadow: 2px 2px purple;
    }

    /* 💀 VIRUS POPUPS */
    .virus-popup {
      position: absolute;
      width: 220px;
      background: black;
      border: 2px solid red;
      color: lime;
      font-family: "Comic Sans MS", cursive;
      box-shadow: 0 0 10px red;
      z-index: 9999;
    }

    .virus-header {
      background: red;
      color: black;
      padding: 5px;
      cursor: grab;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .virus-body {
      padding: 10px;
      font-size: 14px;
    }

    .close-btn {
      cursor: pointer;
      background: black;
      color: red;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- CHAOTIC SQUARES -->
<div class="square green" style="top:20px; left:30px;"></div>
<div class="square purple" style="top:80px; left:100px;"></div>
<div class="square green" style="top:200px; left:50px;"></div>
<div class="square purple" style="top:150px; left:180px;"></div>
<div class="square green" style="top:300px; left:250px;"></div>
<div class="square purple" style="top:50px; left:300px;"></div>

<!-- MAIN CONTENT -->
<div class="container">
  <h1>ENTER THE CHAOS</h1>

  <input type="text" id="value1" placeholder="first???"><br>
  <input type="text" id="value2" placeholder="second???"><br><br>

  <button onclick="checkAccess()">UNLOCK???</button>

  <p id="result"></p>
</div>

<!-- POPUP CONTAINER -->
<div id="popupContainer"></div>

<script>
function checkAccess() {
  const v1 = document.getElementById("value1").value.trim().toLowerCase();
  const v2 = document.getElementById("value2").value.trim().toLowerCase();

  if (v1 === "alpha" && v2 === "beta") {
    window.location.href = "area1.html";
  } else if (v1 === "gamma" && v2 === "delta") {
    window.location.href = "area2.html";
  } else {
    document.getElementById("result").innerText = "WRONG!!! TRY AGAIN HUMAN";
  }
}

/* 💀 VIRUS POPUP SYSTEM */
let popupCount = 0;

function spawnPopup() {
  const popup = document.createElement("div");
  popup.className = "virus-popup";

  const x = Math.random() * (window.innerWidth - 250);
  const y = Math.random() * (window.innerHeight - 200);

  popup.style.left = x + "px";
  popup.style.top = y + "px";

  popup.innerHTML = `
    <div class="virus-header">
      VIRUS ALERT #${popupCount++}
      <button class="close-btn">X</button>
    </div>
    <div class="virus-body">
      SYSTEM COMPROMISED!!!<br>
      DELETE FILES? (YES)
    </div>
  `;

  document.getElementById("popupContainer").appendChild(popup);

  // close
  popup.querySelector(".close-btn").onclick = () => {
    popup.remove();
  };

  // drag
  const header = popup.querySelector(".virus-header");
  let offsetX = 0, offsetY = 0, isDragging = false;

  header.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
    header.style.cursor = "grabbing";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    popup.style.left = (e.clientX - offsetX) + "px";
    popup.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    header.style.cursor = "grab";
  });
}

// spawn chaos automatically
setInterval(() => {
  if (Math.random() < 0.7) spawnPopup();
}, 2000);

// initial chaos burst
for (let i = 0; i < 3; i++) spawnPopup();
</script>

</body>
</html>
