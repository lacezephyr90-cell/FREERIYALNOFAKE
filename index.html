<!DOCTYPE html>
<html>
<head>
  <title>Access Portal</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #111;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Enter Access Code</h2>

<input type="text" id="value1" placeholder="First value">
<br>
<input type="text" id="value2" placeholder="Second value">
<br><br>

<button onclick="checkAccess()">Unlock</button>

<p id="result"></p>

<script>
function checkAccess() {
  const v1 = document.getElementById("value1").value;
  const v2 = document.getElementById("value2").value;

  if (v1 === "alpha" && v2 === "beta") {
    window.location.href = "area1.html";
  } else if (v1 === "gamma" && v2 === "delta") {
    window.location.href = "area2.html";
  } else {
    document.getElementById("result").innerText = "Access denied";
  }
}
</script>

</body>
</html>
