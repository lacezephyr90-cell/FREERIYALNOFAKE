<!DOCTYPE html>
<html>
<head>
  <title>UNLOCK LA FREE ﷼ TODAY</title>

  <style>
    body {
      font-family: "Comic Sans MS", cursive;
      background: black;
      color: lime;
      overflow: hidden;
    }

    .square {
      position: absolute;
      width: 120px;
      height: 120px;
      opacity: 0.5;
      animation: move 4s infinite alternate ease-in-out;
      z-index: 0;
    }

    .triangle {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 120px solid;
      opacity: 0.5;
      animation: move 4s infinite alternate ease-in-out;
      z-index: 0;
    }

    .green { background: lime; border-bottom-color: lime; }
    .purple { background: purple; border-bottom-color: purple; }

    @keyframes move {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(60px, 40px) rotate(180deg); }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 120px;
    }

    h1 {
      font-size: 40px;
      text-shadow: 2px 2px purple;
    }

    input, button {
      font-family: "Comic Sans MS", cursive;
      padding: 10px;
      margin: 5px;
      font-size: 18px;
      border: 2px dashed purple;
      background: black;
      color: lime;
    }

    button:hover {
      background: purple;
      color: lime;
    }

    .captcha {
      margin-top: 15px;
      padding: 10px;
      border: 2px solid lime;
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- BACKGROUND CHAOS -->
<div class="square green" style="top:20px; left:40px;"></div>
<div class="square purple" style="top:120px; left:180px;"></div>
<div class="square green" style="top:260px; left:80px;"></div>
<div class="triangle purple" style="top:80px; left:300px;"></div>
<div class="triangle green" style="top:200px; left:500px;"></div>

<!-- MAIN -->
<div class="container">
  <h1>UNLOCK LA FREE ﷼ TODAY</h1>

  <input type="text" id="code1" placeholder="code 1???"><br>
  <input type="text" id="code2" placeholder="code 2???"><br>

  <div class="captcha">
    <p>VERIFY YOU ARE NOT ROBOT</p>
    <p>Solve: 3 + 4 = ?</p>
    <input type="text" id="captcha">
  </div>

  <br>

  <button onclick="unlock()">UNLOCK???</button>

  <p id="result"></p>
</div>

<script>
function unlock() {
  const c1 = document.getElementById("code1").value.trim();
  const c2 = document.getElementById("code2").value.trim();
  const cap = document.getElementById("captcha").value.trim();

  // CAPTCHA FIRST
  if (cap !== "7") {
    document.getElementById("result").innerText = "CAPTCHA FAILED!!!";
    return;
  }

  // AREA 1 GATE (NOW CORRECTLY IN INDEX)
  if (c1 === "rekeato" && c2 === "11333802") {
    window.location.href = "area1.html";
  } else {
    document.getElementById("result").innerText = "WRONG CODES!!!";
  }
}
</script>

</body>
</html>
